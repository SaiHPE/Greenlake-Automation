name: Release (latest from main)

# Every push/merge to main rebuilds the operator app and refreshes a single rolling
# "latest" GitHub Release, so https://github.com/SaiHPE/Greenlake-Automation/releases/latest
# always has the newest build. Scoped to the app + this workflow so doc-only changes elsewhere
# don't trigger builds; workflow_dispatch lets you run it by hand.
on:
  push:
    branches: [main]
    paths:
      - 'Provisioning_Automation/alletra_onboard/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

# Newest push wins; supersede an in-flight build. The release always exists (assets are
# clobbered, not delete+recreated), so a cancelled run can't leave it half-published.
concurrency:
  group: release-latest
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Provisioning_Automation/alletra_onboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Provisioning_Automation/alletra_onboard/frontend/package-lock.json

      - name: Build release zip
        shell: pwsh
        run: .\scripts\build_release.ps1

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $m = Select-String -Path pyproject.toml -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1
          "version=$($m.Matches[0].Groups[1].Value)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stable-name copy
        shell: pwsh
        run: Copy-Item "release/alletra-onboard-${{ steps.ver.outputs.version }}.zip" "release/alletra-onboard-latest.zip" -Force

      - name: Publish rolling "latest" release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $sha = $env:GITHUB_SHA.Substring(0, 7)
          $notes = "Automated build from ``main`` @ $sha.`n`n$($env:COMMIT_MSG)`n`nDownload **alletra-onboard-latest.zip**, extract, and run ``start.ps1``."
          $assets = @(
            "release/alletra-onboard-$ver.zip",
            "release/alletra-onboard-latest.zip",
            "release/alletra-onboard-$ver.zip.sha256"
          )
          $title = "Alletra Onboard v$ver (latest build from main)"

          # Create the release once; thereafter refresh notes + clobber the assets in place.
          gh release view latest 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh release create latest @assets --title $title --notes $notes --latest
          } else {
            gh release edit latest --title $title --notes $notes --latest
            gh release upload latest @assets --clobber
          }
